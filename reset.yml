---
# Reset playbook to clean up Kubernetes installation
- name: Reset Kubernetes cluster
  hosts: all
  become: yes
  gather_facts: yes
  tasks:
    - name: Drain node (if cluster is running)
      command: kubectl drain {{ inventory_hostname }} --delete-emptydir-data --force --ignore-daemonsets --timeout=60s
      delegate_to: "{{ groups['controlplane'][0] }}"
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      ignore_errors: yes
      when: groups['controlplane'] is defined and groups['controlplane'] | length > 0

    - name: Reset kubeadm
      command: kubeadm reset -f
      ignore_errors: yes

    - name: Stop and disable kubelet
      systemd:
        name: kubelet
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: Stop and disable containerd
      systemd:
        name: containerd
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: Stop and disable keepalived
      systemd:
        name: keepalived
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: Stop and disable node_exporter
      systemd:
        name: node_exporter
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: Remove Kubernetes packages
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
          - containerd.io
          - keepalived
        state: absent
        purge: yes
      ignore_errors: yes

    - name: Remove Kubernetes directories
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes
        - /var/lib/kubelet
        - /var/lib/etcd
        - /etc/cni/net.d
        - /opt/cni/bin
        - /var/lib/containerd
        - /etc/containerd
        - /etc/keepalived
        - /var/lib/node_exporter
        - /home/ubuntu/.kube

    - name: Remove systemd service files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/systemd/system/node_exporter.service
        - /etc/systemd/system/reboot-required.service
        - /etc/systemd/system/reboot-required.timer
        - /usr/local/bin/node_exporter
        - /usr/local/bin/reboot_metric.sh

    - name: Remove Kubernetes APT repositories
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/kubernetes.list
        - /etc/apt/keyrings/kubernetes-apt-keyring.asc
        - /etc/apt/keyrings/docker.asc

    - name: Remove Docker APT repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: absent
      ignore_errors: yes

    - name: Remove kernel modules configuration
      file:
        path: /etc/modules-load.d/k8s.conf
        state: absent

    - name: Remove sysctl configurations
      file:
        path: /etc/sysctl.d/k8s.conf
        state: absent
      ignore_errors: yes

    - name: Restore swap in fstab
      replace:
        path: /etc/fstab
        regexp: '^# (.+\s+swap\s+.*)$'
        replace: '\1'
      ignore_errors: yes

    - name: Enable swap if it was disabled
      command: swapon -a
      ignore_errors: yes

    - name: Remove cron jobs
      cron:
        name: "reboot-required metric update"
        state: absent
      ignore_errors: yes

    - name: Remove unattended-upgrades configuration
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/apt.conf.d/20auto-upgrades
      ignore_errors: yes

    - name: Restore original unattended-upgrades config
      lineinfile:
        path: /etc/apt/apt.conf.d/50unattended-upgrades
        regexp: '^Unattended-Upgrade::Automatic-Reboot'
        state: absent
      ignore_errors: yes

    - name: Restore original unattended-upgrades reboot time
      lineinfile:
        path: /etc/apt/apt.conf.d/50unattended-upgrades
        regexp: '^Unattended-Upgrade::Automatic-Reboot-Time'
        state: absent
      ignore_errors: yes

    - name: Clean up iptables rules
      command: "{{ item }}"
      loop:
        - iptables -F
        - iptables -t nat -F
        - iptables -t mangle -F
        - iptables -X
      ignore_errors: yes

    - name: Remove virtual IP from interface
      command: ip addr del {{ keepalived_vip }}/24 dev {{ keepalived_interface }}
      ignore_errors: yes
      when: keepalived_vip is defined

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Update package cache
      apt:
        update_cache: yes
      ignore_errors: yes

    - name: Autoremove unused packages
      apt:
        autoremove: yes
        purge: yes
      ignore_errors: yes

    - name: Display reset status
      debug:
        msg: "Node {{ inventory_hostname }} has been reset to pre-Kubernetes state"

- name: Clean up SSH keys and configuration
  hosts: all
  tasks:
    - name: Remove SSH configuration block
      blockinfile:
        path: "/home/{{ ansible_user }}/.ssh/config"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - K8S CLUSTER"
        state: absent
      ignore_errors: yes

    - name: Remove cluster SSH keys
      file:
        path: "/home/{{ ansible_user }}/.ssh/{{ item }}"
        state: absent
      loop:
        - id_rsa
        - id_rsa.pub
      ignore_errors: yes
      when: ansible_user != 'root'

    - name: Clean up known_hosts
      known_hosts:
        path: "/home/{{ ansible_user }}/.ssh/known_hosts"
        name: "{{ item }}"
        state: absent
      loop: "{{ groups['all'] }}"
      ignore_errors: yes

- name: Final cleanup message
  hosts: localhost
  tasks:
    - name: Display completion message
      debug:
        msg: |
          🧹 Reset completed!

          All nodes have been reset to their pre-Kubernetes state:
          - Kubernetes components removed
          - Configuration files cleaned up
          - Services stopped and disabled
          - SSH keys and config cleaned up
          - Swap re-enabled
          - iptables rules cleared

          Your nodes are now ready for a fresh installation.