---
- name: Drain node (if cluster is running)
  command: kubectl drain {{ inventory_hostname }} --delete-emptydir-data --force --ignore-daemonsets --timeout=60s
  delegate_to: "{{ groups['controlplane'][0] }}"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  ignore_errors: yes
  when: groups['controlplane'] is defined and groups['controlplane'] | length > 0

- name: Reset kubeadm
  command: kubeadm reset -f
  ignore_errors: yes
  become: yes

- name: Stop and disable kubelet
  systemd:
    name: kubelet
    state: stopped
    enabled: no
  ignore_errors: yes
  become: yes

- name: Stop and disable containerd
  systemd:
    name: containerd
    state: stopped
    enabled: no
  ignore_errors: yes
  become: yes

- name: Unhold Kubernetes packages before removal
  command: apt-mark unhold {{ item }}
  loop:
    - kubelet
    - kubeadm
    - kubectl
    - containerd
  ignore_errors: yes
  become: yes

- name: Remove Kubernetes packages
  apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
      - containerd
    state: absent
    purge: yes
  ignore_errors: yes
  become: yes

- name: Remove Kubernetes directories
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/kubernetes
    - /var/lib/kubelet
    - /var/lib/etcd
    - /etc/cni/net.d
    - /opt/cni/bin
    - /var/lib/containerd
    - /etc/containerd
    - /var/lib/calico
    - /var/lib/cni
    - /home/{{ ansible_user }}/.kube
  become: yes

- name: Remove Kubernetes APT repositories
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/kubernetes.list
    - /etc/apt/keyrings/kubernetes-apt-keyring.asc
    - /etc/apt/keyrings/kubernetes-apt-keyring-v1.31.asc
    - /etc/apt/keyrings/docker.asc
  become: yes

- name: Remove Docker APT repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: absent
  ignore_errors: yes
  become: yes

- name: Remove kernel modules configuration
  file:
    path: /etc/modules-load.d/k8s.conf
    state: absent
  become: yes

- name: Remove sysctl configurations
  file:
    path: /etc/sysctl.d/k8s.conf
    state: absent
  ignore_errors: yes
  become: yes

- name: Restore swap in fstab
  replace:
    path: /etc/fstab
    regexp: '^# (.+\s+swap\s+.*)$'
    replace: '\1'
  ignore_errors: yes
  become: yes

- name: Enable swap if it was disabled
  command: swapon -a
  ignore_errors: yes
  become: yes

- name: Clean up iptables rules
  command: "{{ item }}"
  loop:
    - iptables -F
    - iptables -t nat -F
    - iptables -t mangle -F
    - iptables -X
  ignore_errors: yes
  become: yes

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes
  become: yes

- name: Update package cache
  apt:
    update_cache: yes
  ignore_errors: yes
  become: yes

- name: Autoremove unused packages
  apt:
    autoremove: yes
    purge: yes
  ignore_errors: yes
  become: yes

- name: Display reset status
  debug:
    msg: "Kubernetes cluster has been reset on {{ inventory_hostname }}"