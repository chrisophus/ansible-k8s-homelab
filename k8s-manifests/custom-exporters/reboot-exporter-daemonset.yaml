apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: reboot-exporter
  namespace: monitoring
  labels:
    app: reboot-exporter
spec:
  selector:
    matchLabels:
      app: reboot-exporter
  template:
    metadata:
      labels:
        app: reboot-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9102"
        prometheus.io/path: "/metrics"
    spec:
      hostNetwork: true
      hostPID: true
      containers:
      - name: reboot-exporter
        image: alpine:3.18
        ports:
        - containerPort: 9102
          hostPort: 9102
          name: metrics
        command:
        - /bin/sh
        - -c
        - |
          apk add --no-cache curl bash

          cat > /usr/local/bin/reboot_exporter.sh << 'EOF'
          #!/bin/bash
          PORT=9102

          check_reboot_required() {
              local reboot_required=0
              local security_updates=0
              local uptime_days=0

              # Check for reboot-required file
              if [ -f /host/var/run/reboot-required ]; then
                  reboot_required=1
              fi

              # Check for security updates using chroot
              if [ -x /host/usr/bin/apt ]; then
                  security_count=$(chroot /host /usr/bin/apt list --upgradable 2>/dev/null | grep -i security | wc -l || echo 0)
                  security_updates=$security_count
              fi

              # Calculate days since last reboot
              if [ -f /host/proc/uptime ]; then
                  uptime_seconds=$(cat /host/proc/uptime | cut -d. -f1)
                  uptime_days=$((uptime_seconds / 86400))
              fi

              echo "reboot_required:$reboot_required security_updates:$security_updates uptime_days:$uptime_days"
          }

          generate_metrics() {
              local result=$(check_reboot_required)
              local reboot_required=$(echo "$result" | grep -o 'reboot_required:[0-9]*' | cut -d: -f2)
              local security_updates=$(echo "$result" | grep -o 'security_updates:[0-9]*' | cut -d: -f2)
              local uptime_days=$(echo "$result" | grep -o 'uptime_days:[0-9]*' | cut -d: -f2)

              cat << METRICS
          # HELP node_reboot_required Whether a reboot is required (1 = required, 0 = not required)
          # TYPE node_reboot_required gauge
          node_reboot_required ${reboot_required:-0}

          # HELP node_security_updates_available Number of available security updates
          # TYPE node_security_updates_available gauge
          node_security_updates_available ${security_updates:-0}

          # HELP node_uptime_days Number of days since last reboot
          # TYPE node_uptime_days gauge
          node_uptime_days ${uptime_days:-0}

          # HELP node_reboot_exporter_last_update_timestamp_seconds Timestamp of last update
          # TYPE node_reboot_exporter_last_update_timestamp_seconds gauge
          node_reboot_exporter_last_update_timestamp_seconds $(date +%s)
          METRICS
          }

          while true; do
              response="HTTP/1.1 200 OK\r\nContent-Type: text/plain\r\n\r\n$(generate_metrics)"
              echo -e "$response" | nc -l -p $PORT -q 1 >/dev/null 2>&1 || true
              sleep 30
          done
          EOF

          chmod +x /usr/local/bin/reboot_exporter.sh
          exec /usr/local/bin/reboot_exporter.sh

        securityContext:
          privileged: true

        volumeMounts:
        - name: host-root
          mountPath: /host
          readOnly: true

        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "50m"

      volumes:
      - name: host-root
        hostPath:
          path: /

      tolerations:
      - operator: Exists
        effect: NoSchedule

---
apiVersion: v1
kind: Service
metadata:
  name: reboot-exporter
  namespace: monitoring
  labels:
    app: reboot-exporter
spec:
  selector:
    app: reboot-exporter
  ports:
  - name: metrics
    port: 9102
    targetPort: 9102
  clusterIP: None