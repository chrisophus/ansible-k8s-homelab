---
# Production-grade Prometheus stack configuration
prometheus:
  prometheusSpec:
    retention: 30d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

    # Auto-discover ServiceMonitors
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}

  service:
    type: NodePort
    nodePort: 30090

# Grafana configuration
grafana:
  adminPassword: "homelab123!"

  service:
    type: NodePort
    nodePort: 30300

  persistence:
    enabled: true
    storageClassName: local-path
    size: 10Gi

  grafana.ini:
    server:
      root_url: "http://192.168.0.100:3000"
    security:
      allow_embedding: true

# AlertManager configuration
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

  config:
    global:
      smtp_smarthost: 'localhost:587'
      smtp_from: 'alerts@homelab.local'

    route:
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical-alerts'
        - match:
            alertname: NodeTemperatureHigh
          receiver: 'temperature-alerts'
        - match:
            alertname: RebootRequired
          receiver: 'security-alerts'

    receivers:
      - name: 'default'
        # Add webhook or email config here

      - name: 'critical-alerts'
        # Add critical alert config here
        webhook_configs:
          - url: 'http://localhost:9093/api/v1/alerts'

      - name: 'temperature-alerts'
        # Add temperature alert config here
        webhook_configs:
          - url: 'http://localhost:9093/api/v1/alerts'

      - name: 'security-alerts'
        # Add security alert config here
        webhook_configs:
          - url: 'http://localhost:9093/api/v1/alerts'

  service:
    type: NodePort
    nodePort: 30093

# Node exporter configuration
nodeExporter:
  enabled: true

# Kube-state-metrics configuration
kubeStateMetrics:
  enabled: true

# Disable components we don't need
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false